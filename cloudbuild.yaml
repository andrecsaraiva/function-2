steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - gcloud
      - run
      - deploy
      - function-2
      - --source=./source
      - --function=main
      - --base-image=python314
      - --region=europe-west1
      - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY